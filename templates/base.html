<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ClinicQ{% endblock %} — Health Clinic Queue Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f0f4f8;
      --surface:  #ffffff;
      --primary:  #0a6e5c;
      --primary-light: #e6f4f1;
      --accent:   #f4a124;
      --danger:   #d94f4f;
      --text:     #1a2332;
      --muted:    #6b7a8d;
      --border:   #dce3ec;
      --radius:   12px;
      --shadow:   0 2px 16px rgba(10,110,92,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: var(--primary);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: 0 2px 12px rgba(10,110,92,0.2);
    }
    .nav-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: #fff;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-brand span { font-size: 1.5rem; }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ── FLASH MESSAGES ── */
    .flash-wrap { margin-bottom: 1.25rem; }
    .flash {
      padding: 0.85rem 1.25rem;
      border-radius: var(--radius);
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }
    .flash.success { background: var(--primary-light); color: var(--primary); border-left: 4px solid var(--primary); }
    .flash.error   { background: #fdecea; color: var(--danger); border-left: 4px solid var(--danger); }
    .flash.warning { background: #fff8e6; color: #92600a; border-left: 4px solid var(--accent); }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.75rem;
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      color: var(--primary);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--primary-light);
    }

    /* ── STATS ROW ── */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.25rem;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-number { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--primary); line-height: 1; }
    .stat-label  { font-size: 0.8rem; color: var(--muted); margin-top: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }

    /* ── TABLE ── */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); padding: 0 0.75rem 0.75rem;
    }
    td {
      padding: 0.85rem 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.92rem;
      vertical-align: middle;
    }
    tr:hover td { background: var(--primary-light); }

    /* ── TICKET BADGE ── */
    .ticket {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: 0.78rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #085048; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(10,110,92,0.3); }
    .btn-accent  { background: var(--accent); color: #fff; }
    .btn-accent:hover  { background: #d98e1a; transform: translateY(-1px); }
    .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    .btn-outline:hover { background: var(--primary-light); }

    /* ── SPINNER ── */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FORM ── */
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-weight: 600; font-size: 0.88rem; margin-bottom: 0.4rem; color: var(--text); }
    input, select, textarea {
      width: 100%; padding: 0.7rem 1rem;
      border: 2px solid var(--border);
      border-radius: 8px; font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text); background: var(--bg);
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); background: #fff; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty p { font-size: 1rem; }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 1.75rem; }
    .page-header h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--text); }
    .page-header p  { color: var(--muted); margin-top: 0.3rem; font-size: 0.95rem; }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/"><span>🏥</span> ClinicQ</a>
  <div class="nav-links">
    <a href="/"            {% if request.path == '/'            %}class="active"{% endif %}>Queue</a>
    <a href="/register"    {% if request.path == '/register'    %}class="active"{% endif %}>Register Patient</a>
    <a href="/seen-today"  {% if request.path == '/seen-today'  %}class="active"{% endif %}>Seen Today</a>
  </div>
</nav>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrap">
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
